<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Amiga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; background: #0a0a0f; color: #e0e0e0;
            overflow: hidden;
        }
        #chat { 
            height: calc(100vh - 110px); overflow-y: auto; 
            padding: 25px; display: flex; flex-direction: column; gap: 12px;
        }
        .msg { 
            max-width: 80%; padding: 14px 18px; border-radius: 22px; 
            font-size: 15.5px; line-height: 1.4; font-weight: 450;
        }
        .user { 
            background: linear-gradient(135deg, #0066ff, #00aaff); 
            align-self: flex-end; margin-left: auto;
        }
        .ia { 
            background: rgba(40,40,55,0.8); 
            align-self: flex-start; backdrop-filter: blur(15px);
        }
        #input-area { 
            position: fixed; bottom: 15px; left: 50%; 
            transform: translateX(-50%); width: 92%; max-width: 520px;
            display: flex; background: rgba(25,25,35,0.9);
            padding: 12px 18px; border-radius: 28px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        #input { 
            flex: 1; padding: 14px 20px; border: none; 
            border-radius: 20px; background: rgba(50,50,65,0.7);
            color: #f0f0f0; font-size: 16px; outline: none;
            font-family: inherit;
        }
        #input::placeholder { color: #888; }
        #send { 
            width: 48px; height: 48px; border: none; 
            border-radius: 50%; background: #00cc88; color: white;
            font-size: 16px; cursor: pointer; opacity: 0.9;
            transition: all 0.15s;
        }
        #send:hover:not(:disabled) { background: #00dd99; transform: scale(1.05); }
        #send:disabled { opacity: 0.4; cursor: not-allowed; }
        #mic { 
            width: 48px; height: 48px; border: none; 
            border-radius: 50%; background: #ff5555; color: white;
            font-size: 16px; cursor: pointer; margin-right: 12px;
            opacity: 0.9; transition: all 0.15s;
        }
        #mic:hover:not(:disabled) { background: #ff6666; transform: scale(1.05); }
        #mic.recording { background: #ff8800; box-shadow: 0 0 20px #ff8800; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input-area">
        <button id="mic" title="Falar">🎤</button>
        <input id="input" placeholder="Escreva ou fale..." />
        <button id="send" disabled>→</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const micBtn = document.getElementById('mic');

        // IA INTELIGENTE com memória e contexto
        let conversa = [];
        let respostasUsadas = new Set();

        const temas = {
            saudacao: ['Tudo certo por aqui. E você?', 'Estou bem. Como vai?', 'Tudo fluindo. Qual é a sua?'],
            curiosidade: ['Boa pergunta.', 'Interessante ponto de vista.', 'Faz sentido.'],
            opiniao: ['Concordo em partes.', 'Vejo por esse ângulo também.', 'Perspectiva válida.'],
            tecnico: ['Tecnicamente correto.', 'Funciona assim mesmo.', 'Detalhe importante.'],
            pessoal: ['Legal saber disso sobre você.', 'Entendo essa preferência.', 'Boa escolha.']
        };

        function analisarMensagem(msg) {
            const lower = msg.toLowerCase();
            if (lower.includes('oi') || lower.includes('olá') || lower.includes('e aí')) return 'saudacao';
            if (lower.includes('o que acha') || lower.includes('você acha')) return 'opiniao';
            if (lower.includes('como') || lower.includes('por que')) return 'curiosidade';
            if (lower.includes('site') || lower.includes('program') || lower.includes('código')) return 'tecnico';
            return 'pessoal';
        }

        function gerarResposta(msg) {
            const tema = analisarMensagem(msg);
            const opcoes = temas[tema] || Object.values(temas).flat();
            
            // Remove já usadas
            let disponiveis = opcoes.filter(r => !respostasUsadas.has(r));
            
            if (disponiveis.length === 0) {
                respostasUsadas.clear(); // Reset se esgotou
                disponiveis = opcoes;
            }
            
            const resposta = disponiveis[Math.floor(Math.random() * disponiveis.length)];
            respostasUsadas.add(resposta);
            
            // Adiciona contexto da conversa
            if (conversa.length > 0) {
                return `${resposta} Sobre o que você disse antes...`;
            }
            return resposta;
        }

        function enviar() {
            const msg = input.value.trim();
            if (!msg) return;

            addMsg(msg, 'user');
            conversa.push({ user: msg });
            input.value = '';
            sendBtn.disabled = true;

            setTimeout(() => {
                const resposta = gerarResposta(msg);
                addMsg(resposta, 'ia');
                conversa.push({ ia: resposta });
            }, 600 + Math.random() * 400);
        }

        function addMsg(texto, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.textContent = texto;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        // EVENTOS
        input.oninput = () => sendBtn.disabled = !input.value.trim();
        sendBtn.onclick = enviar;
        input.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviar();
            }
        };

        // MICROFONE SIMPLES
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.interimResults = false;

            micBtn.onclick = () => {
                micBtn.classList.add('recording');
                recognition.start();
            };

            recognition.onresult = (e) => {
                input.value = e.results[0][0].transcript;
                enviar();
            };

            recognition.onend = () => micBtn.classList.remove('recording');
        }

        // BOAS-VINDAS
        setTimeout(() => addMsg('Pronto para conversar sobre qualquer assunto.', 'ia'), 200);
    </script>
</body>
</html>
