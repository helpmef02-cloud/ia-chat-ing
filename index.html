<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Amiga - Fale Sobre Tudo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; background: #0f0f23; color: white;
        }
        #chat { 
            height: 80vh; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
        }
        .msg { 
            max-width: 70%; padding: 12px 18px; border-radius: 20px; 
            margin: 5px 0;
        }
        .user { background: #007aff; align-self: flex-end; }
        .ia { background: #2a2a3e; align-self: flex-start; }
        #input-area { 
            position: fixed; bottom: 20px; left: 50%; 
            transform: translateX(-50%); width: 90%; max-width: 600px;
            display: flex; gap: 10px; background: #1a1a2e; 
            padding: 15px; border-radius: 25px;
        }
        #input { 
            flex: 1; padding: 12px 20px; border: none; 
            border-radius: 20px; background: #2a2a3e; color: white;
        }
        #mic { 
            width: 50px; height: 50px; border: none; 
            border-radius: 50%; background: #ff3b30; 
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 20px;
        }
        #mic.recording { background: #ff9500; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .typing { background: #3a3a4e; position: relative; }
        .typing::after { 
            content: ''; position: absolute; right: 10px; 
            width: 6px; height: 6px; background: #666; 
            border-radius: 50%; animation: dots 1.5s infinite;
        }
    </style>
</head>
<body>
    <div id="chat"></div>
    
    <div id="input-area">
        <input id="input" placeholder="Fale qualquer coisa... (ou use microfone 🎙️)" />
        <button id="mic" title="Falar">🎙️</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const mic = document.getElementById('mic');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        // Config Voice Recognition
        recognition.lang = 'pt-BR';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        let isRecording = false;

        // 🎙️ MICROFONE
        mic.addEventListener('click', toggleMic);
        
        function toggleMic() {
            if (isRecording) {
                recognition.stop();
                mic.classList.remove('recording');
                isRecording = false;
            } else {
                recognition.start();
                mic.classList.add('recording');
                isRecording = true;
            }
        }
        
        recognition.onresult = (e) => {
            const texto = e.results[0][0].transcript;
            input.value = texto;
            enviarMensagem(texto);
            mic.classList.remove('recording');
            isRecording = false;
        };
        
        recognition.onend = () => {
            mic.classList.remove('recording');
            isRecording = false;
        };

        // 💬 ENVIO
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarMensagem(input.value);
        });

        async function enviarMensagem(msg) {
            if (!msg.trim()) return;
            
            addMsg(msg, 'user');
            input.value = '';
            scrollChat();
            
            // Simula IA (substitua por API real)
            const typingEl = addMsg('IA está pensando...', 'typing');
            setTimeout(() => {
                chat.removeChild(typingEl);
                const resposta = await getIAResposta(msg);
                addMsg(resposta, 'ia');
                scrollChat();
            }, 800);
        }

        function addMsg(texto, tipo) {
            const div = document.createElement('div');
            div.className = `msg ${tipo}`;
            div.textContent = texto;
            chat.appendChild(div);
            return div;
        }

        function scrollChat() {
            chat.scrollTop = chat.scrollHeight;
        }

        // 🤖 API IA (substitua pela sua)
        async function getIAResposta(msg) {
            // Exemplo com HuggingFace (GRÁTIS)
            try {
                const res = await fetch('https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer SEU_TOKEN_AQUI' },
                    body: JSON.stringify({ inputs: msg })
                });
                const data = await res.json();
                return data[0]?.generated_text || "Interessante! Me conta mais...";
            } catch {
                return `Sobre "${msg}" eu diria: isso é bem legal! O que acha? 😊`;
            }
        }
    </script>
</body>
</html>
